services:
  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - VALKEY_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - redis

  # Frontend Web Client
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - api

  # Redis Caching Layer
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

networks:
  default:
    name: primetrade_network
